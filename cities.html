<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天気予報 - 都市を選択</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    color: #222;
    min-height: 100vh;
  }

  header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  header p {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }

  header a {
    color: #3a7bd5;
    text-decoration: none;
    font-size: 12px;
  }

  .container {
    max-width: 460px;
    margin: 0 auto;
    padding: 16px 16px 80px;
  }

  .select-box {
    background: #fff;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .select-box label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 8px;
  }

  .select-box select {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    color: #222;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    padding: 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .card-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .city-name {
    font-size: 17px;
    font-weight: 700;
  }

  .updated {
    font-size: 11px;
    color: #999;
  }

  .current {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 14px 0 10px;
  }

  .current .icon {
    font-size: 40px;
    line-height: 1;
  }

  .current .desc {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.4;
  }

  .current .pop {
    font-size: 12px;
    color: #3a7bd5;
    margin-top: 2px;
  }

  .sub-days {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-top: 1px solid #eee;
    border-bottom: 1px solid #eee;
    margin-bottom: 12px;
  }

  .sub-days .sub {
    flex: 1;
    font-size: 12px;
    text-align: center;
  }

  .sub-days .sub .label {
    color: #888;
    margin-bottom: 4px;
  }

  .sub-days .sub .s-icon {
    font-size: 20px;
    margin-bottom: 2px;
  }

  .sub-days .sub .s-desc {
    font-size: 11px;
    color: #555;
    line-height: 1.3;
  }

  .forecast {
    display: flex;
    justify-content: space-between;
  }

  .forecast .day {
    text-align: center;
    flex: 1;
    font-size: 12px;
  }

  .forecast .day .label {
    color: #888;
    margin-bottom: 4px;
  }

  .forecast .day .f-icon {
    font-size: 20px;
    margin-bottom: 4px;
  }

  .forecast .day .hi {
    font-weight: 700;
  }

  .forecast .day .lo {
    color: #999;
    margin-left: 2px;
  }

  .loading, .error {
    text-align: center;
    color: #999;
    font-size: 13px;
    padding: 30px 0;
  }

  .error {
    color: #c0392b;
  }

  .source {
    text-align: center;
    font-size: 11px;
    color: #aaa;
    margin-top: 16px;
  }
</style>
</head>
<body>

<header>
  <h1>天気予報</h1>
  <p>都市を選択 &middot; <a href="index.html">高松/東京/名古屋に戻る</a></p>
</header>

<div class="container">
  <div class="select-box">
    <label for="areaSelect">地域を選んでください</label>
    <select id="areaSelect"></select>
  </div>

  <div id="cardArea">
    <div class="loading">読み込み中...</div>
  </div>
  <div class="source">データ提供: 気象庁</div>
</div>

<script>
  // 気象庁 発表区分（都道府県・地方単位）の地域コード一覧
  const AREAS = [
    { code: '011000', name: '宗谷地方' },
    { code: '012000', name: '上川・留萌地方' },
    { code: '013000', name: '網走・北見・紋別地方' },
    { code: '014030', name: '十勝地方' },
    { code: '014100', name: '釧路・根室地方' },
    { code: '015000', name: '胆振・日高地方' },
    { code: '016000', name: '石狩・空知・後志地方（札幌）' },
    { code: '017000', name: '渡島・檜山地方' },
    { code: '020000', name: '青森県' },
    { code: '030000', name: '岩手県' },
    { code: '040000', name: '宮城県（仙台）' },
    { code: '050000', name: '秋田県' },
    { code: '060000', name: '山形県' },
    { code: '070000', name: '福島県' },
    { code: '080000', name: '茨城県' },
    { code: '090000', name: '栃木県' },
    { code: '100000', name: '群馬県' },
    { code: '110000', name: '埼玉県' },
    { code: '120000', name: '千葉県' },
    { code: '130000', name: '東京都' },
    { code: '140000', name: '神奈川県（横浜）' },
    { code: '150000', name: '新潟県' },
    { code: '160000', name: '富山県' },
    { code: '170000', name: '石川県（金沢）' },
    { code: '180000', name: '福井県' },
    { code: '190000', name: '山梨県' },
    { code: '200000', name: '長野県' },
    { code: '210000', name: '岐阜県' },
    { code: '220000', name: '静岡県' },
    { code: '230000', name: '愛知県（名古屋）' },
    { code: '240000', name: '三重県' },
    { code: '250000', name: '滋賀県' },
    { code: '260000', name: '京都府' },
    { code: '270000', name: '大阪府' },
    { code: '280000', name: '兵庫県（神戸）' },
    { code: '290000', name: '奈良県' },
    { code: '300000', name: '和歌山県' },
    { code: '310000', name: '鳥取県' },
    { code: '320000', name: '島根県' },
    { code: '330000', name: '岡山県' },
    { code: '340000', name: '広島県' },
    { code: '350000', name: '山口県' },
    { code: '360000', name: '徳島県' },
    { code: '370000', name: '香川県（高松）' },
    { code: '380000', name: '愛媛県（松山）' },
    { code: '390000', name: '高知県' },
    { code: '400000', name: '福岡県' },
    { code: '410000', name: '佐賀県' },
    { code: '420000', name: '長崎県' },
    { code: '430000', name: '熊本県' },
    { code: '440000', name: '大分県' },
    { code: '450000', name: '宮崎県' },
    { code: '460040', name: '奄美地方' },
    { code: '460100', name: '鹿児島県（奄美地方除く）' },
    { code: '471000', name: '沖縄本島地方（那覇）' },
    { code: '472000', name: '大東島地方' },
    { code: '473000', name: '宮古島地方' },
    { code: '474000', name: '八重山地方' }
  ];

  // JMA天気コードの大まかな分類（100番台=晴れ, 200番台=くもり, 300番台=雨, 400番台=雪）
  const CODE_LABEL = {
    '100': '晴れ', '101': '晴れ時々くもり', '110': '晴れ後くもり', '111': '晴れ後くもり',
    '200': 'くもり', '201': 'くもり時々晴れ', '202': 'くもり一時雨', '203': 'くもり時々雨',
    '210': 'くもり後晴れ', '211': 'くもり後晴れ', '214': 'くもり後雨',
    '300': '雨', '301': '雨時々晴れ', '302': '雨時々くもり', '303': '雨時々雪',
    '400': '雪', '401': '雪時々晴れ', '402': '雪時々くもり', '403': '雪時々雨'
  };

  function codeCategory(code) {
    const c = String(code || '');
    if (c.startsWith('1')) return { icon: '☀️', label: '晴れ' };
    if (c.startsWith('2')) return { icon: '☁️', label: 'くもり' };
    if (c.startsWith('3')) return { icon: '🌧️', label: '雨' };
    if (c.startsWith('4')) return { icon: '❄️', label: '雪' };
    return { icon: '❓', label: '不明' };
  }

  function iconFromText(text) {
    if (!text) return null;
    if (text.includes('雷')) return '⛈️';
    if (text.includes('雪')) return '❄️';
    if (text.includes('霧')) return '🌫️';
    if (text.includes('雨')) return '🌧️';
    if (text.includes('曇') || text.includes('くもり')) return '☁️';
    if (text.includes('晴')) return '☀️';
    return null;
  }

  function weatherDisplay(code, text) {
    const cat = codeCategory(code);
    const icon = iconFromText(text) || cat.icon;
    const label = text || CODE_LABEL[String(code)] || cat.label;
    return { icon, label };
  }

  function formatUpdated(iso) {
    const d = new Date(iso);
    return (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
      String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ' 時点';
  }

  function formatDayLabel(iso, index) {
    if (index === 0) return '今日';
    if (index === 1) return '明日';
    if (index === 2) return '明後日';
    const d = new Date(iso);
    return (d.getMonth() + 1) + '/' + d.getDate();
  }

  async function fetchAreaWeather(areaCode) {
    const url = `https://www.jma.go.jp/bosai/forecast/data/forecast/${areaCode}.json`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('取得に失敗しました');
    return res.json();
  }

  function renderCard(areaName, data) {
    const shortTerm = data[0];
    const weekly = data[1];

    const shortArea = shortTerm.timeSeries[0].areas[0];
    const shortTimeDefines = shortTerm.timeSeries[0].timeDefines;
    const popsArea = shortTerm.timeSeries[1].areas[0];
    const pops = popsArea.pops;

    const todayPop = Math.max(...pops.slice(0, 2).map(p => parseInt(p, 10) || 0));
    const todayInfo = weatherDisplay(shortArea.weatherCodes[0], shortArea.weathers[0]);

    let subDaysHtml = '';
    for (let i = 1; i <= 2; i++) {
      const info = weatherDisplay(shortArea.weatherCodes[i], shortArea.weathers[i]);
      subDaysHtml += `
        <div class="sub">
          <div class="label">${formatDayLabel(shortTimeDefines[i], i)}</div>
          <div class="s-icon">${info.icon}</div>
          <div class="s-desc">${info.label}</div>
        </div>`;
    }

    const weeklyCodes = weekly.timeSeries[0].areas[0].weatherCodes;
    const weeklyTimeDefines = weekly.timeSeries[0].timeDefines;
    const tempArea = weekly.timeSeries[1].areas[0];

    let forecastHtml = '';
    for (let i = 2; i < weeklyCodes.length; i++) {
      if (!tempArea.tempsMax[i]) continue;
      const info = weatherDisplay(weeklyCodes[i], null);
      forecastHtml += `
        <div class="day">
          <div class="label">${formatDayLabel(weeklyTimeDefines[i], i + 1)}</div>
          <div class="f-icon">${info.icon}</div>
          <div><span class="hi">${tempArea.tempsMax[i]}°</span><span class="lo">${tempArea.tempsMin[i]}°</span></div>
        </div>`;
    }

    return `
      <div class="card">
        <div class="card-header">
          <div class="city-name">${areaName}</div>
          <div class="updated">${formatUpdated(shortTerm.reportDatetime)}</div>
        </div>
        <div class="current">
          <div class="icon">${todayInfo.icon}</div>
          <div>
            <div class="desc">${todayInfo.label}</div>
            <div class="pop">降水確率 ${isFinite(todayPop) ? todayPop : '--'}%</div>
          </div>
        </div>
        <div class="sub-days">
          ${subDaysHtml}
        </div>
        <div class="forecast">
          ${forecastHtml}
        </div>
      </div>`;
  }

  async function loadArea(areaCode, areaName) {
    const cardArea = document.getElementById('cardArea');
    cardArea.innerHTML = '<div class="loading">読み込み中...</div>';

    try {
      const data = await fetchAreaWeather(areaCode);
      cardArea.innerHTML = renderCard(areaName, data);
    } catch (err) {
      cardArea.innerHTML = `<div class="error">エラー: ${err.message}</div>`;
    }
  }

  function init() {
    const select = document.getElementById('areaSelect');
    select.innerHTML = AREAS.map(a => `<option value="${a.code}">${a.name}</option>`).join('');

    const params = new URLSearchParams(window.location.search);
    const initialCode = params.get('area') || '130000';
    select.value = initialCode;

    select.addEventListener('change', () => {
      const area = AREAS.find(a => a.code === select.value);
      loadArea(area.code, area.name);
    });

    const initialArea = AREAS.find(a => a.code === initialCode) || AREAS[0];
    loadArea(initialArea.code, initialArea.name);
  }

  init();
</script>

</body>
</html>
